<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AWS Virtual Classroom</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <div class="navbar-logo-icon">🎓</div>
                AWS Classroom
            </a>
            <ul class="navbar-menu">
                <li><a href="/#features">Features</a></li>
                <li><a href="/#benefits">Benefits</a></li>
            </ul>
            <div class="navbar-buttons">
                <a href="/register" class="btn-register">Register</a>
            </div>
        </div>
    </nav>

    <!-- LOGIN FORM SECTION -->
    <section style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #F8F9FA 0%, #E8EEF5 100%);">
        <div class="form-container">
            <h1 class="form-title">Welcome Back</h1>
            <p class="form-subtitle">Sign in to your AWS Virtual Classroom account</p>

            <form method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="form-group form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin: 0; font-weight: 500;">Remember me on this device</label>
                </div>

                <button type="submit" class="form-button">Sign In</button>

                <div class="form-footer">
                    Don't have an account? 
                    <a href="/register" class="form-link">Register Here</a>
                </div>

                <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E0E0E0; text-align: center;">
                    <a href="#" class="form-link" style="font-size: 0.9rem;">Forgot your password?</a>
                </div>
            </form>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <p class="footer-copyright">&copy; 2024 AWS Virtual Classroom. Hosted on Amazon AWS</p>
        </div>
    </footer>
</body>
</html>
